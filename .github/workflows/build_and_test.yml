name: Build and test .NET

on:
  push:
    branches: [ "master", "develop", "actions", "f_*" ]
  pull_request:
    branches: [ "master", "develop", "actions", "f_*"]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Run Tests
      run: |
        for project in $(find . -type f -name "*.csproj" | grep "Test"); do
          dotnet test $project --no-build --verbosity normal
        done

    - name: SonarCloud Analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      run: |
        dotnet tool install --global dotnet-sonarscanner
        dotnet sonarscanner begin /k:"BrunaPisera_postech-tc-acompanhamento" /o:"bruna-org" /d:sonar.host.url="$SONAR_HOST_URL" /d:sonar.login="$SONAR_TOKEN" /d:sonar.branch.name="master"
        dotnet build --no-restore
        for project in $(find . -type f -name "*.csproj" | grep "Test"); do
          dotnet test $project --no-build --verbosity normal
        done
        dotnet sonarscanner end /d:sonar.login="$SONAR_TOKEN"

  smoke_test:
    runs-on: ubuntu-latest
    needs: build_and_test
    if: github.ref == 'refs/heads/actions'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Run smoke tests
        env: 
          project_name: ${{ secrets.PROJECT_NAME }}
        shell: pwsh
        run: |
          ./smokeTest.ps1
